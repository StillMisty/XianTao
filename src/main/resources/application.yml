spring:
    profiles:
        active: local
    application:
        name: XianTao
        version: 0.0.1
    threads:
        virtual:
            enabled: true
    cache:
        type: caffeine
        caffeine:
            spec: maximumSize=5000,expireAfterWrite=10m

    datasource:
        url: ${DB_URL:jdbc:postgresql://localhost:5432/xiantao}
        username: ${DB_USERNAME:postgres}
        password: ${DB_PASSWORD:}
        driver-class-name: org.postgresql.Driver
        connection-fetch: lazy
        # HikariCP 连接池配置
        hikari:
            maximum-pool-size: 50
            max-lifetime: 1800000
            connection-timeout: 3000
            pool-name: XianTaoHikariCP

    flyway:
        enabled: true
        baseline-on-migrate: true
        locations: classpath:db/migration
        validate-on-migrate: false
    ai:
        openai:
            api-key: ${OPENAI_API_KEY:sk-placeholder}
            base-url: ${OPENAI_BASE_URL:https://api.deepseek.com}
            chat:
                model: ${OPENAI_MODEL:deepseek-v4-flash}

# MyBatis-Flex 配置
mybatis-flex:
    mapper-locations: classpath*:/mappers/**/*.xml
    type-aliases-package: top.stillmisty.xiantao.domain
    configuration:
        log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 日志配置
logging:
    level:
        # MyBatis-Flex SQL 日志
        top.stillmisty.xiantao.infrastructure.mapper: DEBUG
